<div class="dashboard-layout">

  <app-sidebar></app-sidebar> 

  <main class="main-content">

    <header class="page-header">
      <h1>Item Management</h1>
    </header>

    <div class="controls-section">
      <div class="search-bar">
        <span class="custom-mask search-icon-mask"></span>
        <input type="text" placeholder="What are you looking for?">
      </div>
      
      <div class="status-filter">
        <select>
          <option value="all">All Status</option>
          <option value="pending">Pending</option>
          <option value="claimed">Claimed</option>
        </select>
      </div>
    </div>

    <div class="items-grid">
      
      <div class="item-card">
        <div class="card-image">
          <img src="assets/airpods.jpg" alt="Black Airpods">
        </div>
        <div class="card-content">
          <h3>Black Airpods</h3>
          <p class="description">Black Airpods with sticker at back</p>
          
          <div class="meta-info">
            <div class="meta-row">
              <span class="custom-mask location-icon-mask"></span> <span>Nac Building, Room 302</span>
            </div>
            <div class="meta-row">
              <span class="custom-mask calendar-icon-mask"></span> <span>01/01/26</span>
            </div>
          </div>

          <div class="card-actions">
            <button class="icon-btn">
              <span class="custom-mask edit-icon-mask"></span> </button>
            <button class="details-btn">Details</button>
          </div>
        </div>
      </div>
      
      <div class="item-card">
        <div class="card-image"><img src="assets/airpods.jpg" alt="Black Airpods"></div>
        <div class="card-content">
          <h3>Black Airpods</h3>
          <p class="description">Black Airpods with sticker at back</p>
          <div class="meta-info">
            <div class="meta-row"><span class="custom-mask location-icon-mask"></span><span>Nac Building, Room 302</span></div>
            <div class="meta-row"><span class="custom-mask calendar-icon-mask"></span><span>01/01/26</span></div>
          </div>
          <div class="card-actions">
            <button class="icon-btn"><span class="custom-mask edit-icon-mask"></span></button>
            <button class="details-btn">Details</button>
          </div>
        </div>
      </div>

      <div class="item-card">
        <div class="card-image"><img src="assets/airpods.jpg" alt="Black Airpods"></div>
        <div class="card-content">
          <h3>Black Airpods</h3>
          <p class="description">Black Airpods with sticker at back</p>
          <div class="meta-info">
            <div class="meta-row"><span class="custom-mask location-icon-mask"></span><span>Nac Building, Room 302</span></div>
            <div class="meta-row"><span class="custom-mask calendar-icon-mask"></span><span>01/01/26</span></div>
          </div>
          <div class="card-actions">
            <button class="icon-btn"><span class="custom-mask edit-icon-mask"></span></button>

    </div>
  </main>
</div>
