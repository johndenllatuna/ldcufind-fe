  <!-- ── Hardware-Accelerated Page Transition Wrapper ── -->
  <div id="page-content" class="page-transition-wrapper" [class.is-entering]="!pageEntered" [class.is-entered]="pageEntered">

    <header class="page-header">
      <h1>Post Item</h1>
      <p class="page-subtitle">Fill in the details below to report a new found item.</p>
    </header>

    @if (showSuccessMessage) {
      <div class="toast success-toast">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
          <polyline points="22 4 12 14.01 9 11.01"></polyline>
        </svg>
        <span>Item successfully posted in the item management!</span>
      </div>
    }

    @if (showErrorMessage) {
      <div class="toast error-toast">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
          <line x1="12" y1="9" x2="12" y2="13"></line>
          <line x1="12" y1="17" x2="12.01" y2="17"></line>
        </svg>
        <span>Please fill out all fields.</span>
      </div>
    }

    <div class="form-card">
      <form class="post-item-form" [formGroup]="postItemForm" (ngSubmit)="onSubmit()">

        <div class="form-group">
          <label>Item Title</label>
          <input type="text" formControlName="name" placeholder="e.g. Apple AirPods Pro" />
        </div>

        <div class="form-group">
          <label>Description</label>
          <textarea formControlName="description" placeholder="Describe the item, its condition, and any distinguishing features…"></textarea>
        </div>

        <div class="form-row">
          <div class="form-group location-input">
            <label>Location</label>
            <input type="text" formControlName="location" placeholder="e.g. LDCU Library, 2nd Floor" />
          </div>
          <div class="form-group date-input">
            <label>Date Found</label>
            <div class="custom-date-wrapper">
              <input type="text" #datePicker formControlName="date" placeholder="Select date..." readonly />
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="calendar-icon">
                <path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zM9 14H7v-2h2v2zm4 0h-2v-2h2v2zm4 0h-2v-2h2v2zm-8 4H7v-2h2v2zm4 0h-2v-2h2v2zm4 0h-2v-2h2v2z"/>
              </svg>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>Item Image</label>
          <app-image-upload (imageChanged)="onImageChanged($event)"></app-image-upload>
        </div>

        <div class="form-actions">
          <button type="submit" class="submit-btn" [disabled]="isUploading">
            {{ isUploading ? 'Uploading…' : 'Post Item' }}
          </button>
        </div>
      </form>
    </div>

  </div>
