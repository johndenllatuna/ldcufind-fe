<div class="login-wrapper">
  
  <div class="login-card">
    <h1>LDCUfind</h1>
    <h2>Liceo de Cagayan University</h2>
    <p class="admin-portal">Admin Portal</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSignIn($event)">
  
  <div class="form-group">
    <label>Email address</label>
    <input type="email" formControlName="email" placeholder="example@liceo.edu.ph">
    
    @if(loginForm.get('email')?.invalid && loginForm.get('email')?.touched) {
      <small style="color: maroon; font-size: 12px; margin-top: 4px; display: block;">
        Please enter a valid email address.
      </small>
    }
  </div>
  
  <div class="form-group">
    <label>Password</label>
    <input type="password" formControlName="password" placeholder="Enter your password here">
  </div>
  
  <div class="options-group">
    <div class="remember-me">
      <input type="checkbox" id="rememberMe">
      <label for="rememberMe">Remember Me</label>
    </div>
    <a href="#" class="forgot-password">Forgot Password?</a>
  </div>

  <button type="submit" class="sign-in-btn" [disabled]="loginForm.invalid" 
          [style.opacity]="loginForm.invalid ? '0.6' : '1'" 
          [style.cursor]="loginForm.invalid ? 'not-allowed' : 'pointer'">
    Sign In
  </button>
</form>
    
    <p class="bottom-text">Lost and Found Management System</p>
  </div>

</div>
