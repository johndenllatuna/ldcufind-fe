<router-outlet />

@if (authService.showDeactivationModal()) {
<div class="deactivation-overlay">
  <div class="deactivation-modal">

    <!-- Shield icon -->
    <div class="deactivation-modal__icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
    </div>

    <h2 class="deactivation-modal__title">Account Deactivated</h2>
    <p class="deactivation-modal__message">
      Your account has been deactivated. Please visit the lost and found office for more details.
    </p>

    <button class="deactivation-modal__btn" (click)="onDeactivationAction()">
      {{ authService.deactivationModalMode() === 'logout' ? 'Log Out' : 'Continue' }}
    </button>

  </div>
</div>
}
